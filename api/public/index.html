<div id="chat-box" style="height: 300px; overflow-y: auto; border: 1px solid #ccc; padding: 10px;"></div>
<input type="text" id="user-input" placeholder="Ano ang strands sa Manacsac HS?">
<button id="send-btn">Send</button>

<script>
  const sendBtn = document.getElementById('send-btn');
  const userInput = document.getElementById('user-input');
  const chatBox = document.getElementById('chat-box');

  sendBtn.onclick = async () => {
    const msg = userInput.value;
    chatBox.innerHTML += `<div><b>You:</b> ${msg}</div>`;
    userInput.value = '';

    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg })
    });

    const data = await res.json();
    chatBox.innerHTML += `<div><b>AI:</b> ${data.text}</div>`;
  };
</script>
